<mat-button-toggle-group name="mode" appearance="standard"
                         [value]="globalService.mode"
                         [hideSingleSelectionIndicator]="true"
                         (change)="onChangeModeEvent.emit($event.value);
                         globalService.mode = $event.value;">
  <mat-button-toggle value="calendar">
    <mat-icon>calendar_month</mat-icon>
  </mat-button-toggle>
  <mat-button-toggle value="list">
    <mat-icon>lists</mat-icon>
  </mat-button-toggle>
</mat-button-toggle-group>
