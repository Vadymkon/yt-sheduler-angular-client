<div matBadge="edit" matBadgeSize="large" class="custom-icon-badge">
<img [ngSrc]="video().thumbnailURL"
     alt="Thumbnail"
     width="80" height="45"
(click)="fileInput.click()">
</div>
<mat-hint>{{video().owner}}</mat-hint>


<input
  type="file"
  #fileInput
  style="display: none"
  accept="video/*, .png, .jpg, .jpeg"
  (change)="handleFiles($event)"
  multiple>
