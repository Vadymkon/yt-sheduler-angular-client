
<div class="channel-list-item"
     matRipple
     [class.selected]="cb.checked"
     (click)="cb.toggle(); toggleEvent.emit(cb.checked)">
  <mat-checkbox #cb (click)="$event.stopPropagation()"></mat-checkbox>
  <img priority class="channel-avatar" width="40" height="40" [ngSrc]="channel().photoUrl ?? 'https://material.angular.dev/assets/img/examples/shiba1.jpg'"/>
  <div class="channel-text">
    <span class="channel-title">{{ channel().title }}</span>
    <span class="channel-subtitle">Second line</span>
  </div>
  <button mat-icon-button aria-label="Settings" (click)="$event.stopPropagation()" (mousedown)="$event.stopPropagation()">
    <mat-icon>settings</mat-icon>
  </button>
</div>
