<mat-sidenav-container class="example-container">
  <mat-sidenav #sidenavComponent
               [ngClass]="{
               'main-nav': true,
               'main-nav-phone': whatDeviceService.isPhone()
               }"
               mode="side"
               [opened] = "!whatDeviceService.isPhone()">
    <!-- ============================================================== -->
    <!-- Vertical Sidebar -->
    <!-- ============================================================== -->
    <mat-selection-list>
      @for (channel of fakeChannels; track $index)
      {
        <mat-list-option togglePosition="before">
          <img matListItemAvatar width="100" height="100" [ngSrc]=" channel.photoUrl ?? 'https://material.angular.dev/assets/img/examples/shiba1.jpg' "/>
          <span matListItemTitle>{{ channel.title }}</span>
          <span matListItemLine>Second line</span>
          <button matListItemIcon matIconButton aria-label="Close/Open menu" >
            <mat-icon>settings</mat-icon>
          </button>
        </mat-list-option>

      }
    </mat-selection-list>
  </mat-sidenav>

  <mat-sidenav-content>
    <!-- ============================================================== -->
    <!-- Main Content ||| Outlet (content by page-path (e.g /contacts) )-->
    <!-- ============================================================== -->
    <app-header-navbar (toggleMenu)="sidenavComponent.toggle()"></app-header-navbar>
    <ng-content></ng-content>
  </mat-sidenav-content>
</mat-sidenav-container>
