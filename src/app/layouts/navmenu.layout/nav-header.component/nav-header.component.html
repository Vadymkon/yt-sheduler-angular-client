<div class="channel-profile-container">
  <img class="channel-avatar"
       width="80"
       height="80"
       [ngSrc]="channel().photoUrl ?? 'https://material.angular.dev/assets/img/examples/shiba1.jpg'"/>

  <div class="channel-text">
    <span class="channel-title">{{ channel().title }}</span>
    <span class="channel-subtitle">SubText</span>
  </div>
</div>

<mat-divider class="profile-divider"></mat-divider>
