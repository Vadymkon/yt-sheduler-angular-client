<h2 mat-dialog-title>{{ls.t.changeSchedule}}</h2>

<mat-dialog-content>
  <mat-vertical-stepper linear (selectionChange)="updateControllers()">
    <!-- STEP 1 -->
    <mat-step [stepControl]="firstFormGroup" [formGroup]="firstFormGroup">
      <ng-template matStepLabel>{{ ls.t.step1ChooseDays }}</ng-template>
      <app-step1-days [group]="firstFormGroup"></app-step1-days>
    </mat-step>
    <!-- STEP 2 -->
    <mat-step [stepControl]="secondFormGroup" [formGroup]="secondFormGroup">
      <ng-template matStepLabel>{{ ls.t.step2HowManyTimes }}</ng-template>
      <app-step2-count [group]="secondFormGroup"></app-step2-count>
    </mat-step >
    <!-- STEP 3 -->
    <mat-step [stepControl]="thirdFormGroup" [formGroup]="thirdFormGroup">
      <ng-template matStepLabel>{{ ls.t.step3ChooseDays }}</ng-template>
      <app-step3-times [group]="thirdFormGroup"></app-step3-times>
    </mat-step>
  </mat-vertical-stepper>
</mat-dialog-content>
<mat-dialog-actions>
  <button matButton (click)="onNoClick()">{{ ls.t.cancel }}</button>
  <button matButton="filled" (click)="changeShedule()">{{ ls.t.save }}</button>
</mat-dialog-actions>
