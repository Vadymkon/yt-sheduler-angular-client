@if (FAKE_VIDEOS.length != 0) {
  @if (globalService.mode == 'calendar') {
    <app-video-calendar [videos]="FAKE_VIDEOS"></app-video-calendar>
  }
  @else
  {
    <app-video-table-scrollable [videos]="FAKE_VIDEOS"></app-video-table-scrollable>
  }
}

<!-- app-file-getter -->
<div [class]="whatDeviceService.isPhone() || FAKE_VIDEOS.length!=0 ? 'footer' : 'centered-element'">
  <app-file-getter></app-file-getter>
</div>
