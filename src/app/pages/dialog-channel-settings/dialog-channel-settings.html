<h2 mat-dialog-title>{{ls.t.schedule}}</h2>

<mat-dialog-content>
  <p>DEBUG: HERE IS YOUR SCHEDULE</p>
  <button matButton="filled" (click)="openDialogChangeSchedule()">{{ ls.t.changeSchedule }}</button>
</mat-dialog-content>

<mat-dialog-actions>
  <button matButton (click)="onNoClick()">{{ ls.t.close }}</button>
</mat-dialog-actions>
